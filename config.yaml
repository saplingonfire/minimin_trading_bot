# config.yaml — strategy and runner settings (Roostoo SG vs HK Quant Hackathon)
# Set BOT_STRATEGY in .env (e.g. hybrid_trend_cross_sectional or hybrid_trend_cross_sectional_throttled).
# Secrets (API keys) stay in .env only. Tuned for single-instance EC2, API rate limits, 24/7 crypto.

# -----------------------------------------------------------------------------
# Strategy params (merged into strategy_params for the strategy named in BOT_STRATEGY)
# -----------------------------------------------------------------------------

strategy:
  # --- hybrid_trend_cross_sectional + hybrid_trend_cross_sectional_throttled (shared) ---
  N: 5
  ma_window: 20
  momentum_weights: [0.2, 0.3, 0.5]
  target_exposure: 0.80
  max_weight_per_coin: 0.20
  min_trade_usd: 25.0
  min_volume_usd: 500000
  min_price_usd: 0.10
  min_rebalance_pct: 0.015
  pair_cooldown_min: 15
  min_days_history: 3
  rank_interval_min: 30
  rank_buffer: 2              # Held assets stay if within top N+buffer (hysteresis)
  min_hold_hours: 4.0         # Min hours before a position can be stale-sold
  regime_utc_hour: 0
  use_limit_fee_optimization: true
  max_orders_per_cycle: 3
  order_spacing_sec: 30
  db_path: ./prices.db

  # Optional: exclude pairs from the tradeable universe (e.g. memecoins or illiquid)
  exclude_pairs: [
    "PAXGUSDT",  # Gold peg: Uncorrelated to BTC MA20 regime
    "SUSDT",     # Stablecoin: Zero-volatility breaks inverse-vol weighting
    "1000CHEEMSUSDT", # Micro-cap meme: Extreme bid-ask spread risk on mock exchange
  ]

  # --- Risk (hybrid + throttled): kill-switch and error halt ---
  risk:
    max_consecutive_errors: 5
    btc_daily_move_kill: 0.40

  # --- hybrid_trend_cross_sectional_throttled only (prelim soft exposure) ---
  regime:
    ma_window: 20
    prelim_mode: true
    strong_exposure: 0.80
    soft_exposure: 0.35
    consecutive_below_to_off: 2
    regime_eval_hours: 6          # Re-evaluate BTC regime every N hours (24 = once/day)
    breakout_threshold_pct: 0.02  # BTC must exceed MA20 by this % to trigger fast-entry
    breakout_exposure: 0.35       # Exposure level on breakout (soft entry)
    breakout_cooldown_min: 60     # Min minutes between breakout triggers

# -----------------------------------------------------------------------------
# Runner / execution (tick interval, order pacing — stay under Roostoo rate limits)
# -----------------------------------------------------------------------------
execution:
  cycle_sec: 300
  max_orders_per_cycle: 3
  order_spacing_sec: 30
  stale_order_timeout_sec: 600  # Cancel unfilled limit orders older than 10 min
  fees:
    market_bps: 10
    limit_bps: 5

# -----------------------------------------------------------------------------
# Data paths (price store, logs)
# -----------------------------------------------------------------------------
data:
  db_path: ./prices.db
  log_dir: ./logs/

# -----------------------------------------------------------------------------
# Dashboard (initial balance for PnL chart)
# -----------------------------------------------------------------------------
dashboard:
  initial_balance_test: 50000
  initial_balance_live: 1000000

# -----------------------------------------------------------------------------
# Backtest (scripts/run_backtest.py). Align with competition window / account size.
# -----------------------------------------------------------------------------
backtest:
  start_date: "2025-03-18"
  end_date: "2026-03-18"
  initial_balance: 50000
  data_dir: "./data/binance"
